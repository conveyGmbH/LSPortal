<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />

    <link href="crmSettings.css" rel="stylesheet" />
    <link href="../../lib/SalesforceLeadLib/css/salesforceLeadLib.css" rel="stylesheet" />

    <script type="text/javascript" src="../../lib/SalesforceLeadLib/scripts/fakeDataGenerator.js"></script>
    <script type="text/javascript" src="../../lib/SalesforceLeadLib/scripts/salesforceLeadLib.js"></script>
    <script type="text/javascript" src="crmSettingsService.js"></script>
    <script type="text/javascript" src="crmSettingsController.js"></script>
    <script type="text/javascript" src="crmSettings.js"></script>
</head>
<body class="win-type-body">
    <div class="crmSettings fragment">
        <div id="crmSettingsController" class="data-container">
            <section aria-label="Main content" role="main" class="animationElement">
                <div class="contentarea win-type-body">
                    <div class="header-separator"></div>
                    <div class="content-header">
	                    <div class="half-circle half-circle-textcolor">&nbsp;</div>
	                    <div class="content-header-line win-type-caption">
		                    <span class="id-field"></span>
		                    <span class="caption-field" data-win-res="{textContent: 'crmSettings.title'}"></span>
		                    <span class="date-field"></span>
	                    </div>
                    </div>
                    <div class="content-record">
                        <div class="line-separator"></div>
                        <div class="list-header" id="fieldmappings-container"
                             data-win-bind="style.display: eventId Binding.Converter.toDisplay"></div>
                        <div class="crm-inactive-wrap"
                             data-win-bind="style.display: eventId Binding.Converter.toDisplayNone">
                            <div class="crm-inactive-card tile-backgroundcolor">
                                <div class="crm-inactive-icon text-tile-textcolor">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17.5 19a4.5 4.5 0 0 0 .5-8.97A6 6 0 0 0 6.34 9.5 4 4 0 0 0 7 17.46"/>
                                        <path d="M9.5 13.5 12 16l4-4.5"/>
                                    </svg>
                                </div>
                                <h2 class="crm-inactive-title text-tile-textcolor" data-win-res="{textContent: 'crmSettings.inactiveTitle'}"></h2>
                                <p class="crm-inactive-text text-tile-textcolor" data-win-res="{textContent: 'crmSettings.inactiveMessage'}"></p>
                                <p class="crm-inactive-hint label-color" data-win-res="{textContent: 'crmSettings.inactiveHint'}"></p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="error-message"
                     data-win-bind="style.display: error.displayErrorMsg; textContent: error.errorMsg"></div>
            </section>
        </div>
    </div>
</body>
</html>
